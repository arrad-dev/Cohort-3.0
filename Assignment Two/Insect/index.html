<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./Assets/Logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>Insect
    </title>
</head>

<body>
    <main>

        <section class="Left">
            <div class="top">

                <div class="logo">
                    INSECT
                </div>

                <div class="search-box">

                    <i class="ri-search-line"></i>

                    <input type="text" placeholder="Search...">

                </div>

            </div>

            <div class="bottom">
                <div class="classifi">

                    <h1>Classification</h1>

                </div>

                <div class="info">

                    <div class="item">

                        <div class="dot"></div>

                        <div class="text">

                            <h2>Class:</h2>

                            <p>Insecta</p>

                        </div>

                    </div>

                    <div class="item">

                        <div class="dot"></div>

                        <div class="text">

                            <h2>Order:</h2>

                            <p>Coleoptera</p>

                        </div>

                    </div>

                    <div class="item">

                        <div class="dot"></div>

                        <div class="text">

                            <h2>Family:</h2>

                            <p>Cerambycidae</p>

                        </div>

                    </div>

                    <div class="item">

                        <div class="dot"></div>

                        <div class="text">

                            <h2>Sub-Family:</h2>

                            <p>Cerambycinae</p>

                        </div>

                    </div>

                    <div class="item">

                        <div class="dot"></div>

                        <div class="text">

                            <h2>Tribe:</h2>

                            <p>Callichromatini</p>

                        </div>

                    </div>

                    <div class="item">

                        <div class="dot"></div>

                        <div class="text">

                            <h2>Genus:</h2>

                            <p>Pachyteria</p>

                        </div>

                    </div>

                </div>


        </section>


        <section class="Right">
            <nav>

                <a href="#">Home</a>
                <a href="#">Shop</a>
                <a href="#">About</a>
                <a href="#">Gallery</a>
                <a href="#">Contact</a>

            </nav>
            

        </section>




    </main>
</body>

</html>
