<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./Assets/ScaleX.svg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <title>ScaleX</title>
</head>

<body>

    <main>
        <header>
            <div><img src="./Assets/ScaleX.svg" alt="Logo"></div>
            <nav>
                <a href="#">Home</a>
                <a href="#">AboutUs</a>
                <a href="#">Blogs</a>
                <a href="#">ContactUs</a>

            </nav>
            <div><button>Get Started</button></div>
        </header>

        <section id="sec1">
            <h1>Insights & Blogs</h1>
            <div id="catagory">
                <button>All</button>
                <button>Tech</button>
                <button>Saas</button>
                <button>Marketing</button>

            </div>
        </section>

        <section id="sec2">
            <div class="box">
                <img src="./Assets/box1.png" alt="box1">
                <div>
                    <button class="boxButton">Tech</button>
                    <h4>The Ultimate Guide To SaaS Marketing
                    </h4>
                    <p>May 23, 2025</p>
                </div>
            </div>

            <div class="box">
                <img src="./Assets/box2.png" alt="box1">
                <div>
                    <button class="boxButton">Saas</button>
                    <h4>5 Key Trends In SaaS Growth For 2025

                    </h4>
                    <p>May 23, 2025</p>
                </div>
            </div>

            <div class="box">
                <img src="./Assets/box3.png" alt="box1">
                <div>
                    <button class="boxButton">Marketing</button>
                    <h4>How Data-Driven Strategies Are Important
                    </h4>
                    <p>May 23, 2025</p>
                </div>
            </div>

        </section>
