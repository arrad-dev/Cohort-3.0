<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./Assets/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
    <title>Squid Game</title>

</head>

<body>
    <main>
        <header>
            <img src="./Assets/logo.png" alt="Logo">
            <nav>
                <ul>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Watch now</a></li>
                    <li><a href="#">Actors</a></li>
                    <li><a href="#">Contacts</a></li>
                </ul>
            </nav>
            <div><i class="ri-bar-chart-horizontal-line"></i></div>
        </header>



        <section class="hero">

            <!-- left -->

            <div class="left">

                <img src="./Assets/logo.png" alt="Logo">

                <p>
                    Action / Thriller / Drama Series directed
                    by Dong-hyuk Hwang <br> Season 1:9 Episodes
                </p> 

                <div class="buttons">

                    <button class="play-btn">

                        <i class="ri-play-fill"></i>

                        Play Now

                    </button>

                    <button class="trailer-btn">

                        Watch Trailer

                    </button>

                </div>

            </div>

            <!-- right -->

            <div class="right">

                <img src="./Assets/One.png" alt="One">

                <!-- social -->

                <div class="social">

                    <i class="ri-twitter-x-line"></i>
                    <i class="ri-instagram-line"></i>
                    <i class="ri-facebook-circle-line"></i>

                </div>

            </div>

        </section>
        <section id="videos">
            <div class="container">
                <div class="card">

        <img
        src="./Assets/Three.png"
        alt="Three"
        >

        <div class="play">

            <i class="ri-play-fill"></i>

        </div>

    </div>

    <!-- card 2 -->

    <div class="card">

        <img
        src="./Assets/facemask.jpg"
        alt="facemask"
        >

        <div class="play">

            <i class="ri-play-fill"></i>

        </div>

    </div>

    <!-- card 3 -->

    <div class="card">

        <img
        src="./Assets/threeGlow.jpg"
        alt="ThreeGlow"
        >

        <div class="play">

            <i class="ri-play-fill"></i>

        </div>

    </div>

            </div>
        </section>
    </main>
